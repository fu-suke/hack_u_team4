databases:
  - name: linux-virus-db
    databaseName: linux_virus
    plan: free

services:
  - type: web
    name: linux-virus-backend
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --directory backend
    startCommand: uv run --directory backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linux-virus-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
