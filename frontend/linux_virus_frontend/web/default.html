<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linux Virus</title>
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/minimized.css" />
    <link rel="stylesheet" href="./styles/settings.css" />
  </head>
  <body>
    <main id="app" class="app app--minimized">
      <section class="minimized" data-panel="minimized">
        <div class="flip-timer" id="flipTimer">
          <div class="flip-group">
            <div class="flip-card" id="fd0">0</div>
            <div class="flip-card" id="fd1">0</div>
          </div>
          <span class="flip-colon">:</span>
          <div class="flip-group">
            <div class="flip-card" id="fd2">0</div>
            <div class="flip-card" id="fd3">0</div>
          </div>
        </div>
        <div class="minimized__actions">
          <button class="minimized__user" type="button" data-action="showUser" aria-label="User">
            <span id="minimizedUserAvatar" class="user-avatar minimized__user-avatar">👤</span>
            <span id="userBadge" class="minimized__badge minimized__badge--logged-out">?</span>
          </button>
          <button
            class="minimized__settings"
            type="button"
            data-action="showSettings"
            aria-label="Settings"
          >
            ⚙
          </button>
        </div>
      </section>

      <section class="user-panel" data-panel="user">
        <div class="topline">
          <button class="icon-button" type="button" data-action="minimize" aria-label="Back">←</button>
          <span>アカウント</span>
        </div>
        <div id="loggedInUserView" class="user-profile" hidden>
          <div class="user-profile__summary">
            <div id="profileInitial" class="user-avatar user-profile__avatar">U</div>
            <span id="profileUserName" class="user-profile__name">User</span>
            <span id="profileRating" class="user-profile__rating">Rating: 0</span>
          </div>
          <div class="rating-chart">
            <svg id="ratingChart" viewBox="0 0 460 190" role="img" aria-label="レーティング履歴"></svg>
          </div>
          <button class="btn btn--reset user-profile__logout" type="button" data-action="logoutUser">
            ログアウト
          </button>
        </div>
        <div id="loginUserView" class="user-login">
          <div class="user-login__body">
            <div class="user-login__fields">
              <label>
                <span>ユーザー名</span>
                <input
                  id="userName"
                  type="text"
                  maxlength="64"
                  autocomplete="username"
                  autocapitalize="off"
                  spellcheck="false"
                  placeholder="ユーザー名を入力"
                />
              </label>
              <label>
                <span>パスワード</span>
                <input
                  id="userPassword"
                  type="password"
                  maxlength="4"
                  inputmode="numeric"
                  autocomplete="current-password"
                  pattern="\d{4}"
                  placeholder="4桁パスワードを入力"
                />
              </label>
            </div>
            <div id="userMessage" class="user-message"></div>
          </div>
          <div class="actions user-actions">
            <button class="btn btn--check" type="button" data-action="loginUser">ログイン</button>
            <button class="btn btn--reset" type="button" data-action="createUser">新規ユーザー追加</button>
          </div>
        </div>
      </section>

      <section class="settings" data-panel="settings">
        <div class="settings__body">
          <div class="topline">
            <button class="icon-button" type="button" data-action="minimize" aria-label="Back">←</button>
            <span>設定</span>
          </div>
          <div class="settings-time-row">
            <label>
              <span>タイマー（秒）</span>
              <input
                id="timerSeconds"
                inputmode="numeric"
                type="number"
                min="10"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
              />
            </label>
            <label>
              <span>休止時間（分）</span>
              <input
                id="sleepMinutes"
                inputmode="numeric"
                type="number"
                min="0"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
              />
            </label>
          </div>
          <label class="toggle-switch">
            <span class="toggle-switch__label">パーソナライズ出題（ログイン時のみ）</span>
            <span class="toggle-switch__control">
              <input id="personalizeToggle" type="checkbox" checked />
              <span class="toggle-switch__track" aria-hidden="true">
                <span class="toggle-switch__thumb"></span>
              </span>
            </span>
          </label>
        </div>
        <div class="actions settings__footer">
          <button class="btn btn--check" type="button" data-action="done">完了</button>
        </div>
      </section>

    </main>
    <script src="./config.js"></script>
    <script src="./storage.js"></script>
    <script src="./sound.js"></script>
    <script src="./api.js"></script>
    <script src="./user.js"></script>
    <script src="./timer.js"></script>
    <script src="./settings.js"></script>
    <script src="./drag.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
