- difficulty: 1
  category: ["pwd"]
  prompt: カレントディレクトリの絶対パスを表示する。
  choices: ["pwd", "cd"]
  answers: [[1]]
  tutorial: "`pwd` は print working directory の略で、現在の作業ディレクトリの絶対パスを表示する。`cd` はディレクトリを移動するコマンドで、表示用途には使えない。"

- difficulty: 1
  category: ["ls"]
  prompt: カレントディレクトリのファイル一覧を表示する。
  choices: ["ls", "cat"]
  answers: [[1]]
  tutorial: "`ls` はディレクトリ内のファイル一覧を表示するコマンド。`cat` はファイルの中身を表示するコマンドで、一覧表示には使えない。"

- difficulty: 1
  category: ["cd"]
  prompt: 1つ上のディレクトリへ移動する。
  choices: ["cd", "..", "pwd"]
  answers: [[1, 2]]
  tutorial: "`..` は親ディレクトリを表す特殊な記号。`cd ..` で1つ上に移動できる。`pwd` は現在地を表示するだけで、移動はできない。"

- difficulty: 1
  category: ["cd"]
  prompt: ホームディレクトリへ移動する。
  choices: ["cd", "~", "/"]
  answers: [[1, 2]]
  tutorial: "`~` はホームディレクトリ(`/home/ユーザー名`)を表す記号。`/` はルートディレクトリで、システム全体の最上位を指す。"

- difficulty: 1
  category: ["mkdir"]
  prompt: カレントディレクトリに `test` という名前のディレクトリを作成する。
  choices: ["mkdir", "test", "touch"]
  answers: [[1, 2]]
  tutorial: "`mkdir` は make directory の略で、ディレクトリを作成する。`touch` は空ファイルを作成するコマンドで、ディレクトリは作れない。"

- difficulty: 1
  category: ["touch"]
  prompt: カレントディレクトリに `file.txt` という空ファイルを作成する。
  choices: ["touch", "file.txt", "mkdir"]
  answers: [[1, 2]]
  tutorial: "`touch` は空ファイルを作成するコマンド(本来はタイムスタンプ更新用)。`mkdir` はディレクトリ作成用で、ファイルは作れない。"

- difficulty: 1
  category: ["rm"]
  prompt: ファイル `file.txt` を削除する。
  choices: ["rm", "file.txt", "mv"]
  answers: [[1, 2]]
  tutorial: "`rm` は remove の略で、ファイルを削除する。`mv` はファイルの移動や名前変更を行うコマンドで、削除はできない。"

- difficulty: 1
  category: ["cat"]
  prompt: ファイル `file.txt` の内容を表示する。
  choices: ["cat", "file.txt", "ls"]
  answers: [[1, 2]]
  tutorial: "`cat` はファイルの中身を表示するコマンド。`ls` はファイル一覧を表示するコマンドで、ファイルの中身は見られない。"

- difficulty: 1
  category: ["echo"]
  prompt: 文字列 `Hello` を画面に表示する。
  choices: ["echo", "\"Hello\"", "cat"]
  answers: [[1, 2]]
  tutorial: "`echo` は引数の文字列をそのまま画面に表示するコマンド。`cat` はファイルの中身を表示するコマンドで、文字列をそのまま出力する用途には使わない。"

- difficulty: 1
  category: ["cp"]
  prompt: ファイル `a.txt` を `b.txt` という名前でコピーする。
  choices: ["cp", "a.txt", "b.txt", "mv"]
  answers: [[1, 2, 3]]
  tutorial: "`cp` は copy の略で、ファイルをコピーする。`mv` はファイルの移動や名前変更で、コピー(元ファイルを残す)はできない。"

- difficulty: 1
  category: ["mv"]
  prompt: ファイル `old.txt` を `new.txt` という名前に変更する。
  choices: ["mv", "old.txt", "new.txt", "cp"]
  answers: [[1, 2, 3]]
  tutorial: "`mv` は move の略で、ファイルの移動や名前変更を行う。`cp` はコピーを作るコマンドで、元ファイルが残ってしまう。"

- difficulty: 1
  category: ["head"]
  prompt: ファイル `access.log` の先頭部分を表示する。
  choices: ["head", "access.log", "tail"]
  answers: [[1, 2]]
  tutorial: "`head` はファイルの先頭部分(デフォルトでは10行)を表示するコマンド。`tail` は逆に末尾部分を表示するコマンド。"

- difficulty: 1
  category: ["tail"]
  prompt: ファイル `app.log` の末尾部分を表示する。
  choices: ["tail", "app.log", "head"]
  answers: [[1, 2]]
  tutorial: "`tail` はファイルの末尾部分(デフォルトでは10行)を表示するコマンド。ログ確認でよく使う。`head` は逆に先頭部分を表示する。"

- difficulty: 1
  category: ["wc"]
  prompt: ファイル `data.txt` の行数・単語数・文字数を表示する。
  choices: ["wc", "data.txt", "cat"]
  answers: [[1, 2]]
  tutorial: "`wc` は word count の略で、行数・単語数・文字数を表示するコマンド。`cat` はファイルの中身そのものを表示するだけで、カウントはしない。"

- difficulty: 1
  category: ["sort"]
  prompt: ファイル `names.txt` の内容を並べ替えて表示する。
  choices: ["sort", "names.txt", "uniq"]
  answers: [[1, 2]]
  tutorial: "`sort` は行を並べ替えるコマンド(デフォルトはアルファベット順)。`uniq` は重複行を取り除くコマンドで、並べ替えはしない。"

- difficulty: 1
  category: ["ps"]
  prompt: 現在のシェルで実行中のプロセス一覧を表示する。
  choices: ["ps", "kill"]
  answers: [[1]]
  tutorial: "`ps` は process status の略で、実行中のプロセス一覧を表示する。`kill` はプロセスを終了させるコマンドで、表示用途には使えない。"

- difficulty: 1
  category: ["df"]
  prompt: ディスク全体の使用状況を表示する。
  choices: ["df", "du"]
  answers: [[1]]
  tutorial: "`df` は disk free の略で、ファイルシステム全体の空き容量を表示する。`du` はディレクトリやファイル単位の使用量を調べるコマンド。"

- difficulty: 1
  category: ["du"]
  prompt: ディレクトリ `/var/log` 配下の使用容量を表示する。
  choices: ["du", "/var/log", "df"]
  answers: [[1, 2]]
  tutorial: "`du` は disk usage の略で、指定したディレクトリ配下の使用量を表示する。`df` はディスク全体の空き容量を見るコマンドで、特定ディレクトリの調査には向かない。"

- difficulty: 1
  category: ["grep"]
  prompt: ファイル `app.log` から `error` を含む行を表示する。
  choices: ["grep", "\"error\"", "app.log"]
  answers: [[1, 2, 3]]
  tutorial: "`grep` はファイルからパターンに一致する行を抽出するコマンド。検索パターン、対象ファイルの順に指定する。"

- difficulty: 1
  category: ["find"]
  prompt: カレントディレクトリ配下のすべてのファイル・ディレクトリを表示する。
  choices: ["find", ".", "ls"]
  answers: [[1, 2]]
  tutorial: "`find` は指定したディレクトリ配下を再帰的に検索するコマンド。`.` はカレントディレクトリを表す。`ls` は一覧表示用で、再帰検索はオプションが必要(かつ用途が異なる)。"

- difficulty: 1
  category: ["ls"]
  prompt: ディレクトリ `/etc` のファイル一覧を表示する。
  choices: ["ls", "/etc", "cd"]
  answers: [[1, 2]]
  tutorial: "`ls` は引数にディレクトリを指定すると、そのディレクトリの中身を表示する。`cd` はディレクトリ移動用で、表示はしない。"

- difficulty: 1
  category: ["cd"]
  prompt: ディレクトリ `/var/log` へ移動する。
  choices: ["cd", "/var/log", "ls"]
  answers: [[1, 2]]
  tutorial: "`cd` は change directory の略で、指定したディレクトリへ移動する。`ls` は一覧表示用で、移動はできない。"

- difficulty: 1
  category: ["cd"]
  prompt: 直前にいたディレクトリへ戻る。
  choices: ["cd", "-", ".."]
  answers: [[1, 2]]
  tutorial: "`cd -` は直前にいたディレクトリへ戻る便利なコマンド。`..` は親ディレクトリを表す記号で、必ずしも直前にいた場所ではない。"

- difficulty: 1
  category: ["mkdir"]
  prompt: カレントディレクトリに `project` という名前のディレクトリを作成する。
  choices: ["mkdir", "project", "cd"]
  answers: [[1, 2]]
  tutorial: "`mkdir` は make directory の略で、新しいディレクトリを作成する。`cd` は既存のディレクトリへ移動するコマンドで、作成はできない。"

- difficulty: 1
  category: ["touch"]
  prompt: カレントディレクトリに `app.log` という空ファイルを作成する。
  choices: ["touch", "app.log", "cat"]
  answers: [[1, 2]]
  tutorial: "`touch` は空ファイルを作成する。`cat` はファイルの中身を表示するコマンドで、作成用途には使わない。"

- difficulty: 1
  category: ["rm"]
  prompt: ファイル `temp.txt` を削除する。
  choices: ["rm", "temp.txt", "rmdir"]
  answers: [[1, 2]]
  tutorial: "`rm` はファイルを削除するコマンド。`rmdir` は**空ディレクトリ**専用の削除コマンドで、ファイル削除には使えない。"

- difficulty: 1
  category: ["cat"]
  prompt: ファイル `app.log` の内容を表示する。
  choices: ["cat", "app.log", "echo"]
  answers: [[1, 2]]
  tutorial: "`cat` はファイルの中身を表示するコマンド。`echo` は引数の文字列をそのまま出力するコマンドで、ファイルの中身を読むことはできない。"

- difficulty: 1
  category: ["echo"]
  prompt: 文字列 `Hello World` を画面に表示する。
  choices: ["echo", "\"Hello World\"", "print"]
  answers: [[1, 2]]
  tutorial: "`echo` は引数をそのまま画面に出力するシェル組み込みコマンド。`print` というコマンドはLinux標準には存在しない(プログラミング言語の関数と混同しやすい)。"

- difficulty: 1
  category: ["cp"]
  prompt: ファイル `config.yml` を `config.yml.bak` という名前でコピーする。
  choices: ["cp", "config.yml", "config.yml.bak"]
  answers: [[1, 2, 3]]
  tutorial: "`cp` は引数を「コピー元 コピー先」の順に指定する。バックアップ用に `.bak` を付けてコピーするのはよくあるパターン。"

- difficulty: 1
  category: ["mv"]
  prompt: ファイル `report.txt` をディレクトリ `/tmp` へ移動する。
  choices: ["mv", "report.txt", "/tmp", "cp"]
  answers: [[1, 2, 3]]
  tutorial: "`mv` はファイルを別の場所に移動するコマンド。`cp` はコピーで元ファイルが残ってしまうため、移動には使わない。"

- difficulty: 1
  category: ["head"]
  prompt: ファイル `data.csv` の先頭部分を表示する。
  choices: ["head", "data.csv", "top"]
  answers: [[1, 2]]
  tutorial: "`head` はファイルの先頭部分を表示するコマンド。`top` はシステムのプロセス監視用コマンドで、ファイル表示には使わない(名前が似ているので注意)。"

- difficulty: 1
  category: ["tail"]
  prompt: ファイル `error.log` の末尾部分を表示する。
  choices: ["tail", "error.log", "end"]
  answers: [[1, 2]]
  tutorial: "`tail` はファイルの末尾部分を表示するコマンド。`end` というコマンドはLinux標準には存在しない。"

- difficulty: 1
  category: ["wc"]
  prompt: ファイル `access.log` の行数・単語数・文字数を表示する。
  choices: ["wc", "access.log", "count"]
  answers: [[1, 2]]
  tutorial: "`wc` は word count の略で、行数・単語数・文字数をまとめて表示する。`count` というコマンドはLinux標準には存在しない。"

- difficulty: 1
  category: ["sort"]
  prompt: ファイル `users.txt` の内容を並べ替えて表示する。
  choices: ["sort", "users.txt", "order"]
  answers: [[1, 2]]
  tutorial: "`sort` は行を並べ替えるコマンド。`order` というコマンドはLinux標準には存在しない(SQLのキーワードと混同しないよう注意)。"

- difficulty: 1
  category: ["ps"]
  prompt: 全ユーザーのすべてのプロセスを詳細形式で表示する。
  choices: ["ps", "aux", "kill"]
  answers: [[1, 2]]
  tutorial: "`ps aux` は全ユーザーのプロセスを詳細表示する定番の組み合わせ。`a` は全ユーザー、`u` は詳細表示、`x` は端末を持たないプロセスも含めるという意味。`kill` はプロセスを終了させるコマンド。"

- difficulty: 1
  category: ["df"]
  prompt: ディスク全体の使用状況を人間が読みやすい単位で表示する。
  choices: ["df", "-h", "du"]
  answers: [[1, 2]]
  tutorial: "`-h` は human-readable の略で、`1024` を `1K` のように人間が読みやすい単位で表示する。`du` はディレクトリ単位の使用量を見るコマンドで、ディスク全体の状況には向かない。"

- difficulty: 1
  category: ["du"]
  prompt: ディレクトリ `/home` 配下の使用容量を人間が読みやすい単位で表示する。
  choices: ["du", "-h", "/home", "-s"]
  answers: [[1, 2, 3]]
  tutorial: "`-h` は human-readable の略で、サイズを `K`/`M`/`G` などの単位で表示する。`-s` はサマリー(合計のみ)を表示するオプションで、今回は配下すべてを見たいので不要。"

- difficulty: 1
  category: ["uniq"]
  prompt: ファイル `sorted.txt` から連続する重複行を取り除いて表示する。
  choices: ["uniq", "sorted.txt", "sort"]
  answers: [[1, 2]]
  tutorial: "`uniq` は連続する重複行を1つにまとめるコマンド(連続していない重複は除去できないため、通常は `sort` と組み合わせる)。`sort` は並べ替え用で、重複除去そのものはできない。"

- difficulty: 1
  category: ["chmod"]
  prompt: ファイル `script.sh` に実行権限を追加する。
  choices: ["chmod", "+x", "script.sh", "-x"]
  answers: [[1, 2, 3]]
  tutorial: "`+x` は実行権限(execute)を追加する記号。`-x` は逆に実行権限を**削除**する記号で、付与したい場合は使わない。"

- difficulty: 1
  category: ["kill"]
  prompt: PID `1234` のプロセスを終了させる。
  choices: ["kill", "1234", "ps"]
  answers: [[1, 2]]
  tutorial: "`kill` はプロセスにシグナルを送るコマンドで、引数にPID(プロセスID)を指定する。`ps` はプロセス一覧を表示するコマンドで、終了はできない。"

- difficulty: 1
  category: ["ls"]
  prompt: ホームディレクトリのファイル一覧を表示する。
  choices: ["ls", "~", "/"]
  answers: [[1, 2]]
  tutorial: "`~` はホームディレクトリ(`/home/ユーザー名`)を表す記号。`/` はルートディレクトリで、システム全体の最上位を指す別の場所。"

- difficulty: 1
  category: ["cat"]
  prompt: ファイル `notes.txt` の内容を行番号付きで表示する。
  choices: ["cat", "-n", "notes.txt", "-l"]
  answers: [[1, 2, 3]]
  tutorial: "`-n` は number の略で、表示時に行番号を付けるオプション。`-l` は `cat` には存在しないオプション(他のコマンドのものと混同しないよう注意)。"

- difficulty: 1
  category: ["mkdir"]
  prompt: カレントディレクトリに `src` `bin` `docs` の3つのディレクトリをまとめて作成する。
  choices: ["mkdir", "src", "bin", "docs"]
  answers: [[1, 2, 3, 4], [1, 2, 4, 3], [1, 3, 2, 4], [1, 3, 4, 2], [1, 4, 2, 3], [1, 4, 3, 2]]
  tutorial: "`mkdir` は引数を複数渡すと、それらをまとめて作成する。指定順は任意でよい。"

- difficulty: 1
  category: ["rm"]
  prompt: ファイル `a.txt` と `b.txt` をまとめて削除する。
  choices: ["rm", "a.txt", "b.txt"]
  answers: [[1, 2, 3], [1, 3, 2]]
  tutorial: "`rm` は引数を複数渡すと、それらをまとめて削除する。指定順は任意でよい。"

- difficulty: 1
  category: ["head"]
  prompt: ファイル `access.log` の先頭5行を表示する。
  choices: ["head", "-n", "5", "access.log"]
  answers: [[1, 2, 3, 4]]
  tutorial: "`-n` は表示する行数を指定するオプション。`head -n 5` で先頭5行を表示する(デフォルトは10行)。"

- difficulty: 1
  category: ["tail"]
  prompt: ファイル `app.log` の末尾20行を表示する。
  choices: ["tail", "-n", "20", "app.log"]
  answers: [[1, 2, 3, 4]]
  tutorial: "`-n` は表示する行数を指定するオプション。`tail -n 20` で末尾20行を表示する(デフォルトは10行)。"

- difficulty: 1
  category: ["wc"]
  prompt: ファイル `data.txt` の行数のみを表示する。
  choices: ["wc", "-l", "data.txt", "-w"]
  answers: [[1, 2, 3]]
  tutorial: "`-l` は line の略で、行数のみを表示するオプション。`-w` は word の略で、単語数のみを表示する別のオプション。"

- difficulty: 1
  category: ["sort"]
  prompt: ファイル `names.txt` の内容を逆順に並べ替えて表示する。
  choices: ["sort", "-r", "names.txt", "-R"]
  answers: [[1, 2, 3]]
  tutorial: "`-r` は reverse の略で、並び順を逆にするオプション。`-R` は**ランダム順**にするオプションで、動作が異なる(大文字小文字に注意)。"

- difficulty: 1
  category: ["grep"]
  prompt: ファイル `app.log` から `warning` を含む行を、大文字小文字を区別せずに表示する。
  choices: ["grep", "-i", "\"warning\"", "app.log"]
  answers: [[1, 2, 3, 4]]
  tutorial: "`-i` は ignore case の略で、大文字小文字を区別せずに検索するオプション。これにより `WARNING` や `Warning` も一致するようになる。"

- difficulty: 1
  category: ["kill"]
  prompt: PID `5678` のプロセスを強制終了する。
  choices: ["kill", "-9", "5678", "-15"]
  answers: [[1, 2, 3]]
  tutorial: "`-9` は SIGKILL シグナルを送るオプションで、プロセスを強制終了させる。`-15` は SIGTERM(穏やかな終了要求)で、こちらはプロセスに後片付けの猶予を与える。"